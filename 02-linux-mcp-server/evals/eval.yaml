kind: Eval
metadata:
  name: "linux-diagnostic-test"

config:
  # Use Claude Code as the AI agent
  agent:
    type: file
    path: agent.yaml

  # MCP server configuration
  mcpConfigFile: mcp-config.yaml

  # LLM judge configuration
  llmJudge:
    ref:
      type: file
      path: agent.yaml

  # Test tasks
  taskSets:
    - path: tasks/system-info.yaml
      assertions:
        toolsUsed:
          - server: linux-server
            tool: get_system_information
        minToolCalls: 1
        maxToolCalls: 3

    - path: tasks/disk-usage.yaml
      assertions:
        toolsUsed:
          - server: linux-server
            tool: get_disk_usage
        minToolCalls: 1
        maxToolCalls: 3
